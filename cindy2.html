<script>
const P=JSON.parse(document.getElementById('payload').textContent);
const dec=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function unlock(){
  const err=document.getElementById('err'); err.textContent='解密中…';
  try{
    const pw=document.getElementById('pw').value;
    const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:dec(P.salt),iterations:P.iter,hash:'SHA-256'},
      km,{name:'AES-GCM',length:256},false,['decrypt']);
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:dec(P.iv)},key,dec(P.ct));
    const html=new TextDecoder().decode(pt);
    document.open();document.write(html);document.close();
  }catch(e){err.textContent='密碼錯誤，請再試一次';}
}
document.getElementById('go').onclick=unlock;
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock();});
</script></body></html>
