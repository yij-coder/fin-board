<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>個人投資工具 · 首頁</title>
<meta name="theme-color" content="#0b0f17">
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
<link rel="icon" href="./icons/favicon-32.png" sizes="32x32">
<style>
:root{--bg:#0b0f17;--card:#141b29;--line:#27314a;--txt:#e8edf6;--muted:#93a0b8;
  --green:#1fbf75;--accent:#4c8dff}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--txt);
  font-family:-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif;
  padding:34px 16px 60px;line-height:1.5}
.wrap{max-width:560px;margin:0 auto}
header{text-align:center;margin-bottom:26px}
.logo{font-size:40px;margin-bottom:6px}
h1{font-size:22px;margin:0 0 4px}
.sub{color:var(--muted);font-size:14px;margin:0}
.grid{display:grid;gap:12px}
.tile{display:flex;align-items:center;gap:14px;text-decoration:none;color:var(--txt);
  background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:18px 16px;box-shadow:0 10px 30px rgba(0,0,0,.35);transition:.15s}
.tile:hover{border-color:var(--accent);transform:translateY(-2px)}
.tile .ic{font-size:30px;width:48px;text-align:center;flex:none}
.tile .body{flex:1;min-width:0}
.tile .t{font-size:16px;font-weight:800;margin:0 0 2px}
.tile .d{font-size:13px;color:var(--muted);margin:0}
.tile .arw{color:var(--muted);font-size:20px;flex:none}
.badge{display:inline-block;font-size:11px;color:var(--muted);
  border:1px solid var(--line);border-radius:999px;padding:1px 8px;margin-left:6px;vertical-align:middle}
.foot{text-align:center;color:#6b7892;font-size:11px;margin-top:24px}
</style></head><body>
<div class="wrap">
  <header>
    <div class="logo">📊</div>
    <h1>個人投資工具</h1>
    <p class="sub">選一個工具開始</p>
  </header>

  <div class="grid">
    <a class="tile" href="./margin.html">
      <div class="ic">🧮</div>
      <div class="body">
        <p class="t">股票期貨 · 追繳保證金試算</p>
        <p class="d">填數字算原始／維持保證金、風險指標、要補多少錢</p>
      </div>
      <div class="arw">›</div>
    </a>

    <a class="tile" href="./margin-stock.html">
      <div class="ic">🏦</div>
      <div class="body">
        <p class="t">股票融資 · 整戶維持率／追繳試算</p>
        <p class="d">算融資融券整戶維持率、低於標準要補多少現金</p>
      </div>
      <div class="arw">›</div>
    </a>
  </div>

  <div class="foot">個人使用 · 非投資建議</div>
</div>
</body></html>
